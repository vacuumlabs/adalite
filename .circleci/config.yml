version: 2.1

orbs:
  browser-tools: circleci/browser-tools@1.4.0

defaults: &defaults
  docker:
    - image: cimg/node:24.18-browsers
  working_directory: ~/repo

commands:
  setup:
    steps:
      - checkout
      - restore_cache:
          keys:
            - dependencies-{{ checksum "yarn.lock" }}-{{ checksum ".yarnrc.yml" }}
      - run: cp .env.example .env
      - run: corepack enable
      - run: yarn install --immutable
      - save_cache:
          paths:
            - node_modules
            - ../.cache/Cypress
          key: dependencies-{{ checksum "yarn.lock" }}-{{ checksum ".yarnrc.yml" }}

jobs:
  audit:
    <<: *defaults
    steps:
      - setup
      - run: yarn improved-yarn-audit

  lint:
    <<: *defaults
    steps:
      - setup
      - run: yarn eslint

  test_unit:
    <<: *defaults
    steps:
      - setup
      - browser-tools/install-chrome
      # mocha-headless-chrome/puppeteer looks in ~/.cache/puppeteer by default;
      # that cache is not restored in CI, so point at the system Chrome above.
      - run:
          name: yarn test-chrome-headless
          environment:
            PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
          command: yarn test-chrome-headless

  test_integration:
    <<: *defaults
    steps:
      - setup
      - browser-tools/install-chrome
      - run:
          name: Build the app so that server can be started
          command: yarn build
      - run:
          name: Start server with correct env for cypress tests
          command: yarn cypress:dev
          background: true
      - run:
          name: Run Cypress tests
          store_artifacts: true
          command: |
            npx wait-on https://localhost:3000 --timeout 120000
            VIDEO=true yarn cypress:run
      - store_artifacts:
          path: app/cypress/videos
      - store_artifacts:
          path: app/cypress/screenshots

workflows:
  version: 2
  workflow:
    jobs:
      - audit
      - lint
      - test_unit
      - test_integration
